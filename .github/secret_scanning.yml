# Exclude the redaction test suites from secret scanning + push protection.
# These files intentionally contain FAKE, sequential-placeholder secret-shaped
# strings (Stripe / Slack / Anthropic / AWS / JWT placeholders — e.g. the
# AWS-docs EXAMPLE access key and the jwt.io sample token) used to assert that
# redactSecrets() replaces them with [REDACTED]. No real credentials live
# here. See STAGING-REPO.md for details.
paths-ignore:
  - "src/pipeline/__tests__/redact-secrets.test.ts"
  - "src/pipeline/__tests__/redact-secrets.bench.ts"
  - "src/__tests__/secret-leak-integration.test.ts"
