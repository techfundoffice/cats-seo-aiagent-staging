name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: []
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx oxfmt --write .
      - run: npm run check

      # Deploy canary: stamp the public marker with the exact commit + build
      # time before the asset bundle is built, so
      # GET /deploy-verify.txt on the live site always answers "which commit
      # is deployed, and when did it ship?"
      - name: Stamp deploy-verify canary
        run: echo "$GITHUB_SHA $(date -u +%Y-%m-%dT%H:%M:%SZ)" > public/deploy-verify.txt

      - run: npx vite build

      # Wrangler 4.83 returns non-zero (Cloudflare API code 11004
      # "queue already has a consumer") when redeploying a worker whose
      # `wrangler.jsonc` declares a queue consumer that is already attached
      # — even though the worker code itself uploads successfully *before*
      # the consumer-attach call fails. Without this guard CI marks every
      # subsequent deploy as failed (see the manual recovery in commit
      # 337694a) and the downstream Doppler-secret push + D1-migration steps
      # get skipped. Treat the specific 11004 case as success; surface every
      # other failure unchanged.
      - name: Deploy worker (tolerates queue-consumer 11004)
        run: |
          set +e
          OUT=$(npx wrangler deploy 2>&1)
          EXIT=$?
          echo "$OUT"
          if [ $EXIT -ne 0 ] && \
             echo "$OUT" | grep -q "Uploaded cats-seo-aiagent" && \
             echo "$OUT" | grep -q "code: 11004"; then
            echo "::warning::Queue consumer already attached (Cloudflare error code 11004). Worker code uploaded successfully — treating deploy as success."
            EXIT=0
          fi
          exit $EXIT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Push all Doppler secrets to Cloudflare Worker
        run: |
          doppler secrets download \
            --token "$DOPPLER_TOKEN" \
            --no-file \
            --format json \
            | python3 scripts/doppler-to-wrangler-bulk.py \
            | npx wrangler secret bulk
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set DASHBOARD_PASSWORD secret from Doppler
        run: |
          PW=$(doppler secrets get DASHBOARD_PASSWORD --token "$DOPPLER_TOKEN" --plain 2>/dev/null)
          if [ -z "$PW" ]; then
            echo "WARN: DASHBOARD_PASSWORD not in Doppler, using fallback"
            PW='Ishouldofhadav8cs!$*'
          fi
          echo "$PW" | npx wrangler secret put DASHBOARD_PASSWORD
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Apply D1 migrations after the worker is deployed. Idempotent — wrangler
      # tracks applied migrations in d1_migrations on the database.
      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply SKILLS_DB --remote || true
