name: Set Cloudflare Secret

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: "Cloudflare Worker secret name"
        required: true
        default: "DASHBOARD_PASSWORD"
      secret_value:
        description: "Secret value"
        required: true

jobs:
  set-secret:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set Cloudflare Worker secret
        run: printf '%s' "$SECRET_VALUE" | npx wrangler secret put "$SECRET_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_NAME: ${{ github.event.inputs.secret_name }}
          SECRET_VALUE: ${{ github.event.inputs.secret_value }}
